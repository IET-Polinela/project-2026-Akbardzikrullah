{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4 text-center">Dashboard</h2>

    <!-- TOTAL -->
    <div class="alert alert-primary text-center">
        Total Laporan: <strong id="totalReports">0</strong>
    </div>

    <div class="row">

        <!-- BAR -->
        <div class="col-md-6">
            <div class="card shadow-sm p-3 mb-4">
                <h6 class="text-center">Status (Bar Chart)</h6>
                <div style="height:250px;">
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </div>

        <!-- DOUGHNUT -->
        <div class="col-md-6">
            <div class="card shadow-sm p-3 mb-4">
                <h6 class="text-center">Status (Doughnut)</h6>
                <div style="height:250px;">
                    <canvas id="statusPieChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <!-- CATEGORY -->
    <div class="card shadow-sm p-3 mb-4">
        <h6 class="text-center">Kategori Laporan</h6>
        <div style="height:250px;">
            <canvas id="categoryChart"></canvas>
        </div>
    </div>

    <!-- TABLE -->
    <div class="row">

        <div class="col-md-6">
            <div class="card shadow-sm p-3 mb-4">
                <h6 class="text-center">Latest Reported</h6>
                <table class="table table-sm table-striped">
                    <thead>
                        <tr>
                            <th>Judul</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="reportedTable"></tbody>
                </table>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm p-3 mb-4">
                <h6 class="text-center">Latest Resolved</h6>
                <table class="table table-sm table-striped">
                    <thead>
                        <tr>
                            <th>Judul</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="resolvedTable"></tbody>
                </table>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    fetch("{% url 'dashboard_data' %}")
    .then(response => response.json())
    .then(data => {

        // TOTAL
        document.getElementById("totalReports").innerText = data.total_reports;

        // STATUS
        const statusLabels = data.status_data.map(item => item.status);
        const statusValues = data.status_data.map(item => item.total);

        const colors = ["#6c757d", "#0dcaf0", "#ffc107", "#198754"];

        new Chart(document.getElementById("statusChart"), {
            type: "bar",
            data: {
                labels: statusLabels,
                datasets: [{
                    label: "Jumlah",
                    data: statusValues,
                    backgroundColor: colors
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        new Chart(document.getElementById("statusPieChart"), {
            type: "doughnut",
            data: {
                labels: statusLabels,
                datasets: [{
                    data: statusValues,
                    backgroundColor: colors
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        // CATEGORY
        const catLabels = data.category_data.map(item => item.category);
        const catValues = data.category_data.map(item => item.total);

        new Chart(document.getElementById("categoryChart"), {
            type: "bar",
            data: {
                labels: catLabels,
                datasets: [{
                    label: "Jumlah",
                    data: catValues,
                    backgroundColor: "#0d6efd"
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        // TABLE REPORTED
        document.getElementById("reportedTable").innerHTML =
            data.latest_reported.map(item => `
                <tr>
                    <td>${item.title}</td>
                    <td><span class="badge bg-secondary">${item.status}</span></td>
                </tr>
            `).join("");

        // TABLE RESOLVED
        document.getElementById("resolvedTable").innerHTML =
            data.latest_resolved.map(item => `
                <tr>
                    <td>${item.title}</td>
                    <td><span class="badge bg-success">${item.status}</span></td>
                </tr>
            `).join("");

    });

});
</script>

{% endblock %}
